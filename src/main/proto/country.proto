syntax = "proto3";

import "google/protobuf/empty.proto";

package guru.qa.grpc.niffler;

option java_multiple_files = true;
option java_package = "guru.qa.country.grpc";
option java_outer_classname = "CountryProto";

service CountryService {
  rpc ListCountries (google.protobuf.Empty) returns (CountryDetailsList) {}
  rpc CreateCountry (CountryDetails) returns (CountryDetails) {}
  rpc UpdateCountry (UpdateCountryRequest) returns (CountryDetails) {}
  rpc CreateCountryStream(stream CountryDetails) returns (Count) {}
}

message CountryDetailsList {
  repeated CountryDetails details = 1;
}

message CountryDetails {
  string code = 1;
  string name = 2;
}

message UpdateCountryRequest {
  string code = 1;
  CountryDetails details = 2;
}

message Count {
  int32 count = 1;
}
